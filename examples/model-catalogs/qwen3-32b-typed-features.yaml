# Demo ModelCatalog exercising all three recipe feature types:
#   - boolean (text-only): the original on/off toggle.
#   - select  (attention-backend): pick one of N options (n-choose-1).
#   - input   (max-model-len / gpu-memory-utilization): a free value substituted
#     for ${value} in engine_args, coerced to the declared value_type.
# Uses a single real public HF model so it is also deployable (with the
# huggingface model registry from ../model-registries/huggingface.yaml).
apiVersion: v1
kind: ModelCatalog
metadata:
  name: qwen3-32b-typed
  workspace: default
  annotations:
    recipe.vllm.ai/hardware-verified: "H100,H200"
spec:
  engine:
    engine: vllm
    version: v0.17.1
  base:
    engine_args:
      reasoning_parser: qwen3
  variants:
    bf16:
      description: "BF16 dense 32B — 2x H100 (TP2) or 1x H200."
      model:
        registry: huggingface
        name: Qwen/Qwen3-32B
        task: text-generation
        info:
          parameter_count: "32B"
          quantization: bf16
          context_length: "128K"
          architecture: dense
      resources:
        gpu: "2"
        accelerator:
          type: nvidia
          product: H100
      vram_minimum_gb: 80
  features:
    # boolean — on/off
    text-only:
      type: boolean
      description: "Text-only mode (skip vision encoder)."
      default: false
      engine_args:
        language_model_only: true

    # select — pick one of several attention backends
    attention-backend:
      type: select
      description: "Attention backend implementation."
      default_option: flash_attn
      options:
        flash_attn:
          description: "FlashAttention-2 (default, best throughput on Hopper)."
          engine_args:
            attention_backend: FLASH_ATTN
        flashinfer:
          description: "FlashInfer (good for long context + speculative)."
          engine_args:
            attention_backend: FLASHINFER
        xformers:
          description: "xFormers (broadest compatibility)."
          engine_args:
            attention_backend: XFORMERS

    # input — free integer value substituted into engine_args
    max-model-len:
      type: input
      category: tuning
      description: "Maximum context length (tokens)."
      input:
        value_type: int
        default: "32768"
        min: 1
        max: 262144
      engine_args:
        max_model_len: "${value}"

    # input — free number value (0–1) for GPU memory utilization
    gpu-memory-utilization:
      type: input
      category: tuning
      description: "Fraction of GPU memory vLLM may use for weights + KV cache."
      input:
        value_type: number
        default: "0.9"
        min: 0.1
        max: 1.0
      engine_args:
        gpu_memory_utilization: "${value}"
