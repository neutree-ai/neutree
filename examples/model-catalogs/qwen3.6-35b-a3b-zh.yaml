# Neutree ModelCatalog —— Qwen3.6-35B-A3B（中文版，方便中英对照）。
# 数据来源：https://recipes.vllm.ai/Qwen/Qwen3.6-35B-A3B
#          https://huggingface.co/Qwen/Qwen3.6-35B-A3B/blob/main/config.json
# MoE 模型（qwen3_5_moe，视觉+文本）：35B 总参 / 约 3B 激活，256 专家（8 路由 + 1 共享），
# 40 层，GQA 16/2，head_dim 256，原生 262144（256K）上下文。feature 的 display_name
# 对齐部署效果图用语（上下文窗口 / 并发数）。
apiVersion: v1
kind: ModelCatalog
metadata:
  name: qwen3-6-35b-a3b-zh
  workspace: default
  annotations:
    recipe.vllm.ai/hardware-verified: "H200,H100,MI300X,MI355X"
spec:
  engine:
    engine: vllm
    version: v0.17.1
  base:
    engine_args:
      reasoning_parser: qwen3
  variants:
    bf16:
      description: "BF16 基础模型 —— 1x H200 或 2x H100（TP2）。"
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-35B-A3B
        task: text-generation
        info:
          parameter_count: "35B-A3B"
          quantization: bf16
          context_length: "262K"
          architecture: moe
      resources:
        gpu: "2"
        accelerator:
          type: nvidia
          product: H200
      vram_minimum_gb: 160
    fp8:
      description: "官方 FP8 权重 —— 单张 H100/H200（或 1x MI300X/MI325X/MI355X）。"
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-35B-A3B-FP8
        task: text-generation
        info:
          parameter_count: "35B-A3B"
          quantization: fp8
          context_length: "262K"
          architecture: moe
      resources:
        gpu: "1"
        accelerator:
          type: nvidia
          product: H200
      vram_minimum_gb: 80
    nvfp4:
      description: "NVIDIA ModelOpt NVFP4 权重 —— NVIDIA Blackwell（DGX Spark GB10）；需 vLLM nightly / ModelOpt NVFP4 支持。"
      model:
        registry: huggingface
        name: nvidia/Qwen3.6-35B-A3B-NVFP4
        task: text-generation
        info:
          parameter_count: "35B-A3B"
          quantization: nvfp4
          context_length: "262K"
          architecture: moe
      resources:
        gpu: "1"
        accelerator:
          type: nvidia
          product: GB200
      vram_minimum_gb: 48
      engine_args:
        trust_remote_code: true
        kv_cache_dtype: fp8
        attention_backend: flashinfer
        moe_backend: marlin
  features:
    # --- 上下文窗口：可选预设或自填（select + 自由输入 组合框）---
    max-model-len:
      type: input
      display_name: "上下文窗口"
      description: "最大序列长度（token）—— 可选预设或自填（原生上限 262144）。"
      input:
        value_type: int
        default: "262144"
        min: 1
        max: 262144
        suggestions: ["8192", "32768", "131072", "262144"]
      engine_args:
        max_model_len: "${value}"
    # --- 并发数：自由整数输入 ---
    max-num-seqs:
      type: input
      display_name: "并发数"
      category: tuning
      description: "最大并发序列数（解码并行度 / 批宽）。"
      input:
        value_type: int
        default: "256"
        min: 1
        max: 1024
      engine_args:
        max_num_seqs: "${value}"
    # --- 布尔开关 ---
    tool-calling:
      display_name: "工具调用"
      description: "函数 / 工具调用（自动工具选择，qwen3_xml 解析器）。"
      default: false
      engine_args:
        enable_auto_tool_choice: true
        tool_call_parser: qwen3_xml
    text-only:
      display_name: "纯文本模式"
      description: "纯文本模式 —— 跳过视觉编码器，为 KV 缓存释放显存。"
      default: false
      engine_args:
        language_model_only: true
    mtp-speculative:
      display_name: "MTP 推测解码"
      description: "MTP 推测解码（method=mtp，2 个推测 token）。"
      category: tuning
      default: false
      engine_args:
        speculative_config:
          method: mtp
          num_speculative_tokens: 2
    expert-parallel:
      display_name: "专家并行"
      description: "开启 MoE 专家并行（EP），跨引擎 GPU 分布专家。"
      category: tuning
      default: false
      engine_args:
        enable_expert_parallel: true
