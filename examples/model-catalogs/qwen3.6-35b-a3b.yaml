# Neutree ModelCatalog — converted from the vLLM recipe for Qwen3.6-35B-A3B.
# Sources: https://recipes.vllm.ai/Qwen/Qwen3.6-35B-A3B
#          https://huggingface.co/Qwen/Qwen3.6-35B-A3B/blob/main/config.json
# MoE sibling (model_type qwen3_5_moe, vision+text): 35B total / ~3B active,
# 256 experts (8 routed + 1 shared), 40 layers, GQA 16/2 heads, head_dim 256,
# native 262144 (256K) context. Feature display_name labels align with the
# deploy mockup (files.tos.smartx.com/exp_-cheuGh5Q8ntcNjqi1EnYA/index.html).
apiVersion: v1
kind: ModelCatalog
metadata:
  name: qwen3-6-35b-a3b
  workspace: default
  annotations:
    recipe.vllm.ai/hardware-verified: "H200,H100,MI300X,MI355X"
spec:
  engine:
    engine: vllm
    version: v0.17.1
  base:
    engine_args:
      reasoning_parser: qwen3
  variants:
    bf16:
      description: "BF16 base model — 1x H200 or 2x H100 (TP2)."
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-35B-A3B
        task: text-generation
        info:
          parameter_count: "35B-A3B"
          quantization: bf16
          context_length: "262K"
          architecture: moe
      resources:
        gpu: "2"
        accelerator:
          type: nvidia
          product: H200
      vram_minimum_gb: 160
    fp8:
      description: "Official FP8 checkpoint — single H100/H200 (or 1x MI300X/MI325X/MI355X)."
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-35B-A3B-FP8
        task: text-generation
        info:
          parameter_count: "35B-A3B"
          quantization: fp8
          context_length: "262K"
          architecture: moe
      resources:
        gpu: "1"
        accelerator:
          type: nvidia
          product: H200
      vram_minimum_gb: 80
    nvfp4:
      description: "NVIDIA ModelOpt NVFP4 checkpoint — NVIDIA Blackwell (DGX Spark GB10); needs vLLM nightly / ModelOpt NVFP4 support."
      model:
        registry: huggingface
        name: nvidia/Qwen3.6-35B-A3B-NVFP4
        task: text-generation
        info:
          parameter_count: "35B-A3B"
          quantization: nvfp4
          context_length: "262K"
          architecture: moe
      resources:
        gpu: "1"
        accelerator:
          type: nvidia
          product: GB200
      vram_minimum_gb: 48
      engine_args:
        trust_remote_code: true
        kv_cache_dtype: fp8
        attention_backend: flashinfer
        moe_backend: marlin
  features:
    # --- context window: pick a preset OR type a custom length (combobox) ---
    max-model-len:
      type: input
      display_name: "Context window"
      description: "Maximum sequence length (tokens) — pick a preset or type a custom value (native max 262144)."
      input:
        value_type: int
        default: "262144"
        min: 1
        max: 262144
        suggestions: ["8192", "32768", "131072", "262144"]
      engine_args:
        max_model_len: "${value}"
    # --- max concurrency: free integer input ---
    max-num-seqs:
      type: input
      display_name: "Concurrency"
      category: tuning
      description: "Max concurrent sequences (decode parallelism / batch width)."
      input:
        value_type: int
        default: "256"
        min: 1
        max: 1024
      engine_args:
        max_num_seqs: "${value}"
    # --- boolean toggles ---
    tool-calling:
      display_name: "Tool calling"
      description: "Function / tool calling (auto tool choice, qwen3_xml parser)."
      default: false
      engine_args:
        enable_auto_tool_choice: true
        tool_call_parser: qwen3_xml
    text-only:
      display_name: "Text-only mode"
      description: "Text-only mode — skip the vision encoder to free memory for KV cache."
      default: false
      engine_args:
        language_model_only: true
    mtp-speculative:
      display_name: "MTP speculative decoding"
      description: "MTP speculative decoding (method=mtp, 2 speculative tokens)."
      category: tuning
      default: false
      engine_args:
        speculative_config:
          method: mtp
          num_speculative_tokens: 2
    expert-parallel:
      display_name: "Expert parallelism"
      description: "Enable MoE expert parallelism (EP) across the engine's GPUs."
      category: tuning
      default: false
      engine_args:
        enable_expert_parallel: true
