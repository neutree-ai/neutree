# Neutree ModelCatalog — converted from the vLLM recipe for Qwen3.6-27B
# Source: https://recipes.vllm.ai/Qwen/Qwen3.6-27B
# Flagship dense model of the Qwen3.6 family (gated delta-networks hybrid
# attention, vision+text, native 262K context, MTP supported).
apiVersion: v1
kind: ModelCatalog
metadata:
  name: qwen3-6-27b
  workspace: default
  annotations:
    recipe.vllm.ai/hardware-verified: "H200,H100,L40S"
spec:
  engine:
    engine: vllm
    version: v0.17.1
  base:
    engine_args:
      max_model_len: 262144
      reasoning_parser: qwen3
  variants:
    bf16:
      description: "BF16 full-precision weights — 1x H200 or 2x H100."
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-27B
        task: text-generation
        info:
          parameter_count: "27B"
          quantization: bf16
          context_length: "262K"
          architecture: dense
      resources:
        gpu: "2"
        accelerator:
          type: nvidia
          product: H100
      vram_minimum_gb: 140
    fp8:
      description: "Official FP8 checkpoint — fits a single 40 GB GPU (H100/H200/L40S)."
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-27B-FP8
        task: text-generation
        info:
          parameter_count: "27B"
          quantization: fp8
          context_length: "262K"
          architecture: dense
      resources:
        gpu: "1"
        accelerator:
          type: nvidia
          product: H100
      vram_minimum_gb: 40
  features:
    text-only:
      description: "Text-only mode — skip the vision encoder to free memory for KV cache."
      default: false
      engine_args:
        language_model_only: true
        enable_prefix_caching: true
    disable-thinking:
      description: "Disable reasoning / thinking output."
      default: false
      engine_args:
        default_chat_template_kwargs:
          enable_thinking: false
    mtp-speculative:
      description: "MTP (multi-token prediction) speculative decoding for lower-latency decode."
      category: tuning
      default: false
      engine_args:
        speculative_config:
          method: mtp
          num_speculative_tokens: 1
