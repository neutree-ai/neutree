# Neutree ModelCatalog — converted from the vLLM recipe for Qwen3.6-27B.
# Sources: https://recipes.vllm.ai/Qwen/Qwen3.6-27B
#          https://huggingface.co/Qwen/Qwen3.6-27B/blob/main/config.json
# Dense flagship of the Qwen3.6 family (model_type qwen3_5, vision+text,
# 64 layers, GQA 24/4 heads, head_dim 256, native 262144 (256K) context).
apiVersion: v1
kind: ModelCatalog
metadata:
  name: qwen3-6-27b
  workspace: default
  annotations:
    recipe.vllm.ai/hardware-verified: "H200,H100,L40S"
spec:
  engine:
    engine: vllm
    version: v0.17.1
  base:
    engine_args:
      reasoning_parser: qwen3
  variants:
    bf16:
      description: "BF16 full-precision weights — 1x H200 or 2x H100 (TP2)."
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-27B
        task: text-generation
        info:
          parameter_count: "27B"
          quantization: bf16
          context_length: "262K"
          architecture: dense
      resources:
        gpu: "2"
        accelerator:
          type: nvidia
          product: H100
      vram_minimum_gb: 140
    fp8:
      description: "Official FP8 checkpoint — fits a single 40 GB GPU (H100/H200/L40S)."
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-27B-FP8
        task: text-generation
        info:
          parameter_count: "27B"
          quantization: fp8
          context_length: "262K"
          architecture: dense
      resources:
        gpu: "1"
        accelerator:
          type: nvidia
          product: H100
      vram_minimum_gb: 40
  features:
    # --- context window: select one of several sizes (native max = 262144) ---
    max-model-len:
      type: select
      description: "Context window — maximum sequence length (tokens)."
      default_option: "262144"
      options:
        "8192":
          description: "8K — smallest footprint, fits the tightest single-GPU setups."
          engine_args: { max_model_len: 8192 }
        "32768":
          description: "32K — balanced throughput / memory."
          engine_args: { max_model_len: 32768 }
        "131072":
          description: "128K — long-document workloads."
          engine_args: { max_model_len: 131072 }
        "262144":
          description: "256K — native maximum context."
          engine_args: { max_model_len: 262144 }
    # --- max concurrency: free integer input (parallelism / batch width) ---
    max-num-seqs:
      type: input
      category: tuning
      description: "Max concurrent sequences (decode parallelism / batch width)."
      input:
        value_type: int
        default: "256"
        min: 1
        max: 1024
      engine_args:
        max_num_seqs: "${value}"
    # --- existing boolean toggles ---
    text-only:
      description: "Text-only mode — skip the vision encoder to free memory for KV cache."
      default: false
      engine_args:
        language_model_only: true
        enable_prefix_caching: true
    disable-thinking:
      description: "Disable reasoning / thinking output."
      default: false
      engine_args:
        default_chat_template_kwargs:
          enable_thinking: false
    mtp-speculative:
      description: "MTP (multi-token prediction) speculative decoding for lower-latency decode."
      category: tuning
      default: false
      engine_args:
        speculative_config:
          method: mtp
          num_speculative_tokens: 1
