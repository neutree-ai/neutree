# Neutree ModelCatalog —— Qwen3.6-27B（中文版，方便中英对照）。
# 数据来源：https://recipes.vllm.ai/Qwen/Qwen3.6-27B
#          https://huggingface.co/Qwen/Qwen3.6-27B/blob/main/config.json
# Qwen3.6 旗舰稠密模型（qwen3_5，视觉+文本，64 层，GQA 24/4，head_dim 256，
# 原生 262144（256K）上下文）。feature 的 display_name 对齐部署效果图用语
# （files.tos.smartx.com/exp_-cheuGh5Q8ntcNjqi1EnYA/index.html：上下文窗口 / 并发数）。
apiVersion: v1
kind: ModelCatalog
metadata:
  name: qwen3-6-27b-zh
  workspace: default
  annotations:
    recipe.vllm.ai/hardware-verified: "H200,H100,L40S"
spec:
  engine:
    engine: vllm
    version: v0.17.1
  base:
    engine_args:
      reasoning_parser: qwen3
  variants:
    bf16:
      description: "BF16 全精度权重 —— 1x H200 或 2x H100（TP2）。"
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-27B
        task: text-generation
        info:
          parameter_count: "27B"
          quantization: bf16
          context_length: "262K"
          architecture: dense
      resources:
        gpu: "2"
        accelerator:
          type: nvidia
          product: H100
      vram_minimum_gb: 140
    fp8:
      description: "官方 FP8 权重 —— 单张 40 GB GPU 即可（H100/H200/L40S）。"
      model:
        registry: huggingface
        name: Qwen/Qwen3.6-27B-FP8
        task: text-generation
        info:
          parameter_count: "27B"
          quantization: fp8
          context_length: "262K"
          architecture: dense
      resources:
        gpu: "1"
        accelerator:
          type: nvidia
          product: H100
      vram_minimum_gb: 40
  features:
    # --- 上下文窗口：可选预设或自填（select + 自由输入 组合框）---
    max-model-len:
      type: input
      display_name: "上下文窗口"
      description: "最大序列长度（token）—— 可选预设或自填（原生上限 262144）。"
      input:
        value_type: int
        default: "262144"
        min: 1
        max: 262144
        suggestions: ["8192", "32768", "131072", "262144"]
      engine_args:
        max_model_len: "${value}"
    # --- 并发数：自由整数输入 ---
    max-num-seqs:
      type: input
      display_name: "并发数"
      category: tuning
      description: "最大并发序列数（解码并行度 / 批宽）。"
      input:
        value_type: int
        default: "256"
        min: 1
        max: 1024
      engine_args:
        max_num_seqs: "${value}"
    # --- 布尔开关 ---
    text-only:
      display_name: "纯文本模式"
      description: "纯文本模式 —— 跳过视觉编码器，为 KV 缓存释放显存。"
      default: false
      engine_args:
        language_model_only: true
        enable_prefix_caching: true
    disable-thinking:
      display_name: "关闭思考"
      description: "关闭 reasoning / 思考输出。"
      default: false
      engine_args:
        default_chat_template_kwargs:
          enable_thinking: false
    mtp-speculative:
      display_name: "MTP 推测解码"
      description: "MTP（多 token 预测）推测解码，降低解码时延。"
      category: tuning
      default: false
      engine_args:
        speculative_config:
          method: mtp
          num_speculative_tokens: 1
