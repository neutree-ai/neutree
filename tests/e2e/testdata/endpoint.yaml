apiVersion: v1
kind: Endpoint
metadata:
  name: {{ .E2E_ENDPOINT_NAME }}
  workspace: {{ .E2E_WORKSPACE }}
spec:
  cluster: {{ .E2E_CLUSTER_NAME }}
  engine:
    engine: {{ .E2E_ENGINE_NAME }}
    version: {{ .E2E_ENGINE_VERSION }}
  model:
    registry: {{ .E2E_MODEL_REGISTRY }}
    name: {{ .E2E_MODEL_NAME }}
    version: {{ .E2E_MODEL_VERSION }}
    task: {{ .E2E_MODEL_TASK }}
  resources:
    gpu: "{{ .E2E_GPU }}"
{{- if .E2E_CPU }}
    cpu: "{{ .E2E_CPU }}"
{{- end }}
{{- if .E2E_MEMORY }}
    memory: "{{ .E2E_MEMORY }}"
{{- end }}
    accelerator:
      type: {{ .E2E_ACCELERATOR_TYPE }}
      product: {{ .E2E_ACCELERATOR_PRODUCT }}
  variables:
    engine_args:
{{- range .E2E_ENGINE_ARGS }}
      {{ .Key }}: {{ .Value }}
{{- end }}
{{- if .E2E_ENV }}
  env:
{{- range $k, $v := .E2E_ENV }}
    {{ $k }}: "{{ $v }}"
{{- end }}
{{- end }}
  replicas:
    num: 1
  deployment_options:
    scheduler:
      load_factor: 1.25
      type: consistent_hash
      virtual_nodes: 150
