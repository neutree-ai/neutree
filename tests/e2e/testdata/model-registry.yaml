apiVersion: v1
kind: ModelRegistry
metadata:
  name: {{ .E2E_MODEL_REGISTRY }}
  workspace: {{ .E2E_WORKSPACE }}
spec:
  type: {{ .E2E_MODEL_REGISTRY_TYPE }}
  url: {{ .E2E_MODEL_REGISTRY_URL }}
{{- if .E2E_MODEL_REGISTRY_CREDENTIALS }}
  credentials: {{ .E2E_MODEL_REGISTRY_CREDENTIALS }}
{{- end }}
