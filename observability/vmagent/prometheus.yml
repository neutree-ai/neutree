global:
  scrape_interval: 30s # Set the scrape interval to every 30 seconds. Default is every 1 minute.

scrape_configs:
# Scrape from each Ray node as defined in the service_discovery.json provided by Ray.
- job_name: 'neutree'
  file_sd_configs:
  - files:
    - '/etc/prometheus/scrape/*.json'

# Ray use applicationName as application label value in metrics.
# it cause the UI can not show the dashboard correctly.
# So we use relabeling to change it to "endpointName".
  metric_relabel_configs:
    - source_labels: [application]
      target_label: application_original
      regex: '(.+)'
      replacement: '$1'
    - source_labels: [application]
      regex: '([^_]+)_(.+)'
      target_label: application
      replacement: '$2'
  # Convert ray_vllm: or ray_vllm_ prefix to vllm: prefix
  # ray_vllm:e2e_request_latency_seconds_bucket => vllm:e2e_request_latency_seconds_bucket (old clusters)
  # ray_vllm_e2e_request_latency_seconds_bucket => vllm:e2e_request_latency_seconds_bucket (Ray 2.53.0+)
    - source_labels: [__name__]
      regex: 'ray_vllm[:_](.+)'
      target_label: __name__
      replacement: 'vllm:$1'
  # Strip Ray's auto-prepended ray_ from SGLang metrics so dashboard panels
  # query the names SGLang upstream uses natively (e.g.
  # sglang_e2e_request_latency_seconds_bucket). Symmetric to the vLLM rule
  # above but with sglang_ output (not sglang:) — SGLang upstream uses an
  # underscore separator throughout, including in their reference Grafana
  # dashboard, so preserving that lets us reuse upstream queries verbatim.
    - source_labels: [__name__]
      regex: 'ray_sglang[:_](.+)'
      target_label: __name__
      replacement: 'sglang_$1'
    - action: labeldrop
      regex: 'cache_dtype|calculate_kv_scales|cpu_kvcache_space_bytes|cpu_offload_gb|cpu_offload_params|enable_prefix_caching|gpu_memory_utilization|is_attention_free|kv_cache_memory_bytes|kv_offloading_backend|kv_offloading_size|kv_sharing_fast_prefill|mamba_.*|num_cpu_blocks|num_gpu_blocks_override|prefix_caching_hash_algo|sliding_window|swap_space'
