apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .EndpointName }}
  namespace: {{ .Namespace }}
  labels:
    engine: {{ .EngineName }}
    engine_version: {{ .EngineVersion }}
    routing_logic: {{ .RoutingLogic }}
    app: inference
    neutree.io/component: pd-collocated
spec:
  replicas: {{ .Replicas }}
  progressDeadlineSeconds: 1200
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      cluster: {{ .ClusterName }}
      workspace: {{ .Workspace }}
      endpoint: {{ .EndpointName }}
      app: inference
  template:
    metadata:
      annotations:
        neutree.io/pd-deployment-type: group
        neutree.io/pd-router-port: "{{ .PD.Router.Port }}"
      labels:
        engine: {{ .EngineName }}
        engine_version: {{ .EngineVersion }}
        cluster: {{ .ClusterName }}
        workspace: {{ .Workspace }}
        endpoint: {{ .EndpointName }}
        routing_logic: {{ .RoutingLogic }}
        app: inference
        neutree.io/component: pd-collocated
        neutree.io/leader: "true"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: endpoint
                      operator: In
                      values:
                        - {{ .EndpointName }}
                topologyKey: "kubernetes.io/hostname"
      {{- if .NodeSelector }}
      nodeSelector:
        {{- range $key, $value := .NodeSelector }}
        {{ $key }}: {{ $value }}
        {{- end }}
      {{- end }}
      {{- if .ImagePullSecret }}
      imagePullSecrets:
        - name: {{ .ImagePullSecret }}
      {{- end }}

      {{- if .Volumes }}
      volumes:
{{ .Volumes | toYaml | indent 6 }}
      {{- end }}
      initContainers:
        - name: model-downloader
          image: {{ .ImagePrefix }}/neutree/neutree-runtime:{{ .NeutreeVersion }}
          command:
            - bash
            - -c
          args:
            - >-
              python3 -m neutree.downloader
              --name="{{ .ModelArgs.name }}"
              --registry_type="{{ .ModelArgs.registry_type }}"
              --registry_path="{{ .ModelArgs.registry_path }}"
              --path="{{ .ModelArgs.path }}"
              --version="{{ .ModelArgs.version }}"
              --file="{{ .ModelArgs.file }}"
              --task="{{ .ModelArgs.task }}"
          env:
           {{ range $key, $value := .Env }}
           - name: {{ $key }}
             value: "{{ $value }}"
           {{ end }}
          {{- if .VolumeMounts }}
          volumeMounts:
{{ .VolumeMounts | toYaml | indent 10 }}
          {{- end }}

      containers:
        - name: pd-router
          image: {{ .PD.Router.Image }}
          env:
            - name: NEUTREE_PD_CONFIG
              value: {{ .PD.ConfigJSON | quote }}
            - name: NEUTREE_PD_ROUTER_PORT
              value: "{{ .PD.Router.Port }}"
            - name: NEUTREE_PD_GROUP_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NEUTREE_PD_GROUP_RANK
              value: "0"
            {{- range $key, $value := .Env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .PD.Router.Port }}
          startupProbe:
            httpGet:
              path: {{ .PD.Router.HealthPath }}
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: {{ .PD.Router.HealthPath }}
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
        {{- $pdPorts := index .PD.Ports 0 }}
        {{- range .PD.Roles }}
        {{- $role := . }}
        {{- range $rank := until .Instances }}
        {{- $rolePorts := index $pdPorts $role.Name }}
        {{- $rankPorts := index $rolePorts $rank }}
        - name: {{ $role.Name }}-{{ $rank }}
          image: {{ $.ImagePrefix }}/{{ $.ImageRepo }}:{{ $.ImageTag }}
          command:
          - python3
          - -m
          - sglang.launch_server
          - --host
          - "0.0.0.0"
          - --port
          - "$(NEUTREE_PD_HTTP_PORT)"
          - --model-path
          - {{ $.ModelArgs.path }}
          - --served-model-name
          - {{ $.ModelArgs.serve_name }}
          {{- $engineArgs := $role.EngineArgs }}
          {{- if and (not (hasKey $engineArgs "disaggregation_mode")) (not (hasKey $engineArgs "disaggregation-mode")) }}
          - --disaggregation-mode
          - "{{ $role.Name }}"
          {{- end }}
          {{- if and (not (hasKey $engineArgs "disaggregation_transfer_backend")) (not (hasKey $engineArgs "disaggregation-transfer-backend")) }}
          {{- $transferBackend := "nixl" }}
          {{- if $role.KVTransferConnector }}
          {{- $transferBackend = $role.KVTransferConnector }}
          {{- end }}
          {{- if hasKey $role.KVTransferExtra "transfer_backend" }}
          {{- $transferBackend = get $role.KVTransferExtra "transfer_backend" }}
          {{- else if hasKey $role.KVTransferExtra "backend" }}
          {{- $transferBackend = get $role.KVTransferExtra "backend" }}
          {{- end }}
          - --disaggregation-transfer-backend
          - "{{ $transferBackend }}"
          {{- end }}
          {{- if and (eq $role.Name "prefill") (not (hasKey $engineArgs "disaggregation_bootstrap_port")) (not (hasKey $engineArgs "disaggregation-bootstrap-port")) }}
          - --disaggregation-bootstrap-port
          - "$(NEUTREE_PD_SIDE_CHANNEL_PORT)"
          {{- end }}
          {{- if and (hasKey $role.KVTransferExtra "disaggregation_ib_device") (not (hasKey $engineArgs "disaggregation_ib_device")) (not (hasKey $engineArgs "disaggregation-ib-device")) }}
          - --disaggregation-ib-device
          - "{{ get $role.KVTransferExtra "disaggregation_ib_device" }}"
          {{- end }}
          {{- if $role.EngineArgs }}
          {{- range $key, $value := $role.EngineArgs }}
          - --{{ $key | replace "_" "-" }}
      {{- if ne (printf "%v" $value) "true"}}
          - "{{ $value }}"
      {{- end }}
          {{- end }}
          {{- end }}
          {{- if $role.Resources }}
          resources:
            limits:
              {{- range $key, $value := $role.Resources }}
              {{ $key }}: {{ $value }}
              {{- end }}
            requests:
              {{- range $key, $value := $role.Resources }}
              {{ $key }}: {{ $value }}
              {{- end }}
          {{- end }}
          env:
            - name: NEUTREE_PD_ROLE
              value: "{{ $role.Name }}"
            - name: NEUTREE_PD_RANK
              value: "{{ $rank }}"
            - name: NEUTREE_PD_GROUP_RANK
              value: "0"
            - name: NEUTREE_PD_HTTP_PORT
              value: "{{ index $rankPorts "http" }}"
            - name: NEUTREE_PD_SIDE_CHANNEL_PORT
              value: "{{ index $rankPorts "side_channel" }}"
            {{ range $key, $value := $role.Env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{ end }}
          ports:
            - name: http
              containerPort: {{ index $rankPorts "http" }}
            {{- if gt (index $rankPorts "side_channel") 0 }}
            - name: side-channel
              containerPort: {{ index $rankPorts "side_channel" }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          {{- if $.VolumeMounts }}
          volumeMounts:
{{ $.VolumeMounts | toYaml | indent 10 }}
          {{- end }}
        {{- end }}
        {{- end }}
