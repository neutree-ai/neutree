{{- if .Values.api.ingress.enabled -}}
{{- $ing := .Values.api.ingress -}}
{{- if not $ing.host }}{{ fail "api.ingress.enabled is true but api.ingress.host is empty" }}{{ end }}
{{- $host := tpl (toString $ing.host) . -}}
{{- if not $host }}{{ fail "api.ingress.enabled is true but api.ingress.host renders empty" }}{{ end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "neutree.fullname" . }}-api
  labels:
    {{- include "neutree.labels" . | nindent 4 }}
  {{- with $ing.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $ing.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with $ing.tls }}
  tls:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ $ing.path | default "/" | quote }}
            pathType: {{ $ing.pathType | default "Prefix" | quote }}
            backend:
              service:
                name: {{ include "neutree.fullname" . }}-api-service
                port:
                  number: 3000
{{- end -}}
