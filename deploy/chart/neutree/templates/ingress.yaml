{{- if .Values.ingress.enabled -}}
{{- $fullname := include "neutree.fullname" . -}}
{{- $svcDefaults := dict
    "api"      (dict "name" (printf "%s-api-service" $fullname) "port" 3000)
    "gateway"  (dict "name" (printf "%s-kong-proxy"  $fullname) "port" 80)
    "grafana"  (dict "name" (printf "%s-grafana"     .Release.Name) "port" 80)
    "vminsert" (dict "name" (printf "%s-victoria-metrics-cluster-vminsert" .Release.Name) "port" 8480)
-}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "neutree.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $key, $cfg := .Values.ingress.hosts }}
    {{- if and $cfg.enabled $cfg.host }}
    {{- $defaults := index $svcDefaults $key }}
    {{- if not $defaults }}{{ fail (printf "ingress.hosts.%s is not a recognized backend (expected one of: api, gateway, grafana, vminsert)" $key) }}{{ end }}
    {{- $svc := $cfg.service | default dict }}
    {{- $svcName := $svc.name | default $defaults.name }}
    {{- $svcPort := $svc.port | default $defaults.port }}
    - host: {{ $cfg.host | quote }}
      http:
        paths:
          - path: {{ $cfg.path | default "/" }}
            pathType: {{ $cfg.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
    {{- end }}
    {{- end }}
{{- end -}}
