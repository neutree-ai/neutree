{{- if and .Values.grafana.ingress.enabled (not .Values.grafana.enabled) -}}
{{- fail "grafana.ingress.enabled is true but grafana.enabled is false" -}}
{{- end -}}
{{- if and .Values.grafana.ingress.enabled (eq (len .Values.grafana.ingress.hosts) 0) -}}
{{- fail "grafana.ingress.enabled is true but grafana.ingress.hosts is empty" -}}
{{- end -}}
{{- $grafanaRootURL := dig "grafana.ini" "server" "root_url" "" .Values.grafana -}}
{{- if and .Values.grafana.ingress.enabled (not $grafanaRootURL) -}}
{{- fail "grafana.ingress.enabled is true but grafana.grafana.ini.server.root_url is empty; set it to the public Grafana URL" -}}
{{- end -}}
{{- if and .Values.grafana.ingress.enabled (gt (len .Values.grafana.ingress.tls) 0) (gt (len .Values.grafana.ingress.hosts) 0) -}}
{{- $grafanaHost := tpl (toString (first .Values.grafana.ingress.hosts)) . -}}
{{- if and .Values.system.grafana.url (hasPrefix (printf "http://%s" $grafanaHost) .Values.system.grafana.url) -}}
{{- fail "grafana.ingress.tls is configured but system.grafana.url uses http for the Grafana Ingress host; use https" -}}
{{- end -}}
{{- if and $grafanaRootURL (hasPrefix (printf "http://%s" $grafanaHost) (tpl (toString $grafanaRootURL) .)) -}}
{{- fail "grafana.ingress.tls is configured but grafana.grafana.ini.server.root_url uses http for the Grafana Ingress host; use https" -}}
{{- end -}}
{{- end -}}
{{- $vmEnabled := index .Values "victoria-metrics-cluster" "enabled" -}}
{{- $vminsert := index .Values "victoria-metrics-cluster" "vminsert" -}}
{{- if and $vminsert.ingress.enabled (not $vmEnabled) -}}
{{- fail "victoria-metrics-cluster.vminsert.ingress.enabled is true but victoria-metrics-cluster.enabled is false" -}}
{{- end -}}
{{- if and $vminsert.ingress.enabled (eq (len $vminsert.ingress.hosts) 0) -}}
{{- fail "victoria-metrics-cluster.vminsert.ingress.enabled is true but victoria-metrics-cluster.vminsert.ingress.hosts is empty" -}}
{{- end -}}
{{- if and $vminsert.ingress.enabled (gt (len $vminsert.ingress.hosts) 0) -}}
{{- $vminsertHost := tpl (toString (get (first $vminsert.ingress.hosts) "name")) . -}}
{{- if not $vminsertHost -}}
{{- fail "victoria-metrics-cluster.vminsert.ingress.enabled is true but victoria-metrics-cluster.vminsert.ingress.hosts[0].name is empty" -}}
{{- end -}}
{{- end -}}
{{- if and $vminsert.ingress.enabled .Values.metrics.remoteWriteUrl (gt (len $vminsert.ingress.tls) 0) (gt (len $vminsert.ingress.hosts) 0) -}}
{{- $vminsertHost := tpl (toString (get (first $vminsert.ingress.hosts) "name")) . -}}
{{- if hasPrefix (printf "http://%s" $vminsertHost) .Values.metrics.remoteWriteUrl -}}
{{- fail "victoria-metrics-cluster.vminsert.ingress.tls is configured but metrics.remoteWriteUrl uses http for the VMInsert Ingress host; use https" -}}
{{- end -}}
{{- end -}}
