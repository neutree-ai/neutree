{{- $aiTraceStoreUrl := include "neutree.aiTraceStoreUrl" . -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "neutree.fullname" . }}-vector
  labels:
    {{ include "neutree.labels" . | nindent 4 }}
data:
  vector.yml: |-
    secret:
      jwt_secret:
        type: directory
        path: /etc/vector/cridentials/
    sources:
      kong_logs:
        type: http_server
        address: 0.0.0.0:30122
        encode: json
    transforms:
      parse_kong_logs:
        type: remap
        inputs:
          - kong_logs
        source: |
          . = parse_json!(.message)

          # Access fields with hyphens using proper VRL syntax

          .extracted_data.request_id = .request.id
          .extracted_data.timestamp = .started_at
          .extracted_data.status = .response.status
          .extracted_data.api_version = .request.api_version
          .extracted_data.api_key_id = .consumer.custom_id
          if exists(.request.uri) {
              .extracted_data.url_split = split!(.request.uri, "/")
              .extracted_data.workspace = .extracted_data.url_split[2]      # workspace name from /workspace/{workspace}/...
              .extracted_data.endpoint_type = .extracted_data.url_split[3]  # "endpoint" or "external-endpoint"
              .extracted_data.endpoint_name = .extracted_data.url_split[4]  # endpoint name from /workspace/{workspace}/{type}/{endpoint_name}
          }

          if exists(.ai) && exists(.ai."statistics") && exists(.ai."statistics".usage) {
              .extracted_data.total_tokens = .ai."statistics".usage.total_tokens
              .extracted_data.prompt_tokens = .ai."statistics".usage.prompt_tokens
              .extracted_data.completion_tokens = .ai."statistics".usage.completion_tokens
              .extracted_data.cache_read_tokens = .ai."statistics".usage.cache_read_tokens
              .extracted_data.cache_creation_tokens = .ai."statistics".usage.cache_creation_tokens
              .extracted_data.reasoning_tokens = .ai."statistics".usage.reasoning_tokens
              .extracted_data.cost_usd = .ai."statistics".usage.cost

              if exists(.ai."statistics".meta) && exists(.ai."statistics".meta.request_model) {
                  .extracted_data.model_name = .ai."statistics".meta.request_model
              }

              if exists(.ai."statistics".meta) && exists(.ai."statistics".meta.message_id) {
                  .extracted_data.message_id = .ai."statistics".meta.message_id
              }

              if to_int!(.extracted_data.total_tokens) > 0 {
                  ._has_usage = true
              } else {
                  ._has_usage = false
              }
          } else {
              ._has_usage = false
          }
      filter_usage_logs:
        type: filter
        inputs:
          - parse_kong_logs
        condition: ._has_usage == true
      prepare_postgrest_payload:
        type: remap
        inputs:
          - filter_usage_logs
        source: |
          . = {
              "p_api_key_id": .extracted_data.api_key_id,
              "p_request_id": .extracted_data.request_id,
              "p_usage_amount": .extracted_data.total_tokens,
              "p_endpoint_name": .extracted_data.endpoint_name,
              "p_endpoint_type": .extracted_data.endpoint_type,
              "p_model_name": .extracted_data.model_name,
              "p_prompt_tokens": .extracted_data.prompt_tokens,
              "p_completion_tokens": .extracted_data.completion_tokens,
              "p_cache_read_tokens": .extracted_data.cache_read_tokens,
              "p_cache_creation_tokens": .extracted_data.cache_creation_tokens,
              "p_reasoning_tokens": .extracted_data.reasoning_tokens,
              "p_cost_usd": .extracted_data.cost_usd,
              "p_message_id": .extracted_data.message_id
          }
      {{- if $aiTraceStoreUrl }}
      filter_trace_logs:
        type: filter
        inputs:
          - parse_kong_logs
        condition: exists(.ai."trace".request_body) || exists(.ai."trace".response_body)
      prepare_trace_payload:
        type: remap
        inputs:
          - filter_trace_logs
        source: |
          . = {
              # VictoriaLogs rejects records without a non-empty `_msg`. Failed
              # requests often carry no response body, so `_msg` must be a field
              # that is always populated — never the (optional) response body.
              "_msg":           .request.id || "ai-trace",
              "request_id":     .request.id,
              "timestamp":      .started_at,
              "workspace":      .extracted_data.workspace || "",
              "endpoint_type":  .extracted_data.endpoint_type || "",
              "endpoint_name":  .extracted_data.endpoint_name || "",
              # Optional string columns are coalesced to "" so every record carries
              # the same string type even when the source field is absent (e.g. an
              # error response that returned early before `ai.statistics`, or a
              # success with no `finish_reason`). The numeric columns below are left
              # nullable on purpose: the query API decodes them into pointer/optional
              # fields and must distinguish "no token/latency data" from a real 0.
              "api_key_id":     .consumer.custom_id || "",
              "request_uri":    .request.uri || "",
              "request_model":  .ai."statistics".meta.request_model || "",
              "response_model": .ai."statistics".meta.response_model || "",
              "response_status": .response.status,
              "prompt_tokens":     .ai."statistics".usage.prompt_tokens,
              "completion_tokens": .ai."statistics".usage.completion_tokens,
              "total_tokens":      .ai."statistics".usage.total_tokens,
              "finish_reason":  .ai."trace".finish_reason || "",
              "stream":         .ai."trace".stream || false,
              "user_agent":     .request.headers."user-agent" || "",
              "duration_ms":    .latencies.request,
              "request_body":   .ai."trace".request_body || "",
              "response_body":  .ai."trace".response_body || "",
          }
      {{- end }}
    sinks:
      postgrest_rpc:
        type: http
        inputs:
          - prepare_postgrest_payload
        encoding:
          codec: json
        framing:
          method: newline_delimited
        compression: none
        uri: http://{{ include "neutree.fullname" . }}-api-service:3000/api/v1/rpc/record_api_usage
        method: post
        auth:
          strategy: bearer
          token: "SECRET[jwt_secret.secret]"
        headers:
          content-type: application/json
        batch:
          max_events: 1
          timeout_secs: 1
      {{- if $aiTraceStoreUrl }}
      ai_trace_victorialogs:
        type: http
        inputs:
          - prepare_trace_payload
        uri: {{ $aiTraceStoreUrl }}/insert/jsonline?_stream_fields=workspace,endpoint_type,endpoint_name&_time_field=timestamp
        method: post
        encoding:
          codec: json
        framing:
          method: newline_delimited
        compression: none
        request:
          headers:
            Content-Type: application/stream+json
        batch:
          max_events: 100
          timeout_secs: 1
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "neutree.fullname" . }}-vector
  labels:
    {{ include "neutree.labels" . | nindent 4 }}
spec:
  ports:
    - name: aggregator-log
      port: 30122
      protocol: TCP
      targetPort: 30122
  selector:
    app.kubernetes.io/component: neutree-vector
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "neutree.fullname" . }}-vector
  labels:
    {{ include "neutree.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: neutree-vector
  minReadySeconds: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/component: neutree-vector
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "neutree.fullname" . }}-sa
      initContainers:
        - name: init-jwt-secret
          image: {{ include "neutree.image" (dict "global" .Values.global "componentRegistry" .Values.jwtCli.image.registry "repository" .Values.jwtCli.image.repository "tag" .Values.jwtCli.image.tag "defaultTag" .Values.jwtCli.image.tag) }}
          imagePullPolicy: {{ .Values.jwtCli.image.pullPolicy}}
          args:
            - encode
            - --secret
            - $(JWT_SECRET)
            - --out
            - /etc/vector/cridentials/secret
            - '{"role":"service_role"}'
          env:
            - name: JWT_SECRET
              value: {{ include "neutree.jwtSecret" . }}
          volumeMounts:
            - name: jwt-secret
              mountPath: "/etc/vector/cridentials/"
      containers:
        - name: vector
          image: {{ include "neutree.image" (dict "global" .Values.global "componentRegistry" .Values.vector.image.registry "repository" .Values.vector.image.repository "tag" .Values.vector.image.tag "defaultTag" .Values.vector.image.tag) }}
          imagePullPolicy: {{ .Values.vector.image.pullPolicy}}
          args:
            - --config-dir
            - /etc/vector/
          env:
            - name: VECTOR_LOG
              value: "info"
          ports:
            - name: aggregator-log
              containerPort: 30122
              protocol: TCP
          {{- with .Values.vector.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: jwt-secret
              mountPath: "/etc/vector/cridentials/"
            - name: data
              mountPath: "/vector-data-dir"
            - name: config
              mountPath: "/etc/vector/"
              readOnly: true
      terminationGracePeriodSeconds: 60
      volumes:
        - name: jwt-secret
          emptyDir: {}
        - name: data
          emptyDir: {}
        - name: config
          projected:
            sources:
              - configMap:
                  name: {{ include "neutree.fullname" . }}-vector