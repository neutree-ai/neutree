# Default values for neutree.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  # Global image registry for all components
  # When set, this registry will be used for:
  # - All main chart components (api, core, db, auth, etc.) via global.image.registry
  # - Victoria Metrics Cluster (via global.image.registry)
  # - Grafana (via global.imageRegistry)
  # Note: To use a unified registry, global.image.registry should equal global.imageRegistry.
  image:
    registry: ""
  imageRegistry: ""
  imagePullSecrets: []

# JWT secret for authentication (required)
jwtSecret: ""
# the password for the neutree admin user.
# it is valid when starting neutree core for the first time.
# It is recommended to change it quickly after installation.
adminPassword: ""

system:
  grafana:
    url: ""
  # External AI inference trace store (VictoriaLogs) base URL.
  # Only used when victorialogs.enabled is false. Leave empty to disable the
  # AI inference trace APIs and the Vector trace pipeline altogether.
  aiTraceStoreUrl: ""

metrics:
  # Specify the URL for remote write if using an external metrics storage system.
  # Leave this empty to use the embedded Victoria Metrics cluster.
  remoteWriteUrl: ""

k8sWaitFor:
  image:
    registry: ghcr.io
    repository: groundnuty/k8s-wait-for
    tag: "v2.0"
    pullPolicy: IfNotPresent

dbScripts:
  image:
    registry: ""
    repository: neutree/neutree-db-scripts
    tag: ""
    pullPolicy: IfNotPresent

db:
  image:
    registry: ""
    repository: library/postgres
    tag: "13"
    pullPolicy: IfNotPresent
  user: postgres
  password: pgpassword
  name: neutree
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 2
      memory: 2Gi
  persistence:
    enabled: true
    size: 40Gi
    accessModes:
      - ReadWriteOnce
  service:
    type: ClusterIP
  nodeSelector: {}
  tolerations: []
  affinity: {}

auth:
  image:
    registry: ""
    repository: supabase/gotrue
    tag: "v2.170.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP

migration:
  image:
    registry: ""
    repository: migrate/migrate
    tag: v4.18.3
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

postgrest:
  image:
    registry: ""
    repository: postgrest/postgrest
    tag: v14.0
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP

postgresmeta:
  image:
    registry: ""
    repository: supabase/postgres-meta
    tag: "v0.86.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP

core:
  image:
    registry: ""
    repository: neutree/neutree-core
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  server:
    service:
      type: ClusterIP

api:
  image:
    registry: ""
    repository: neutree/neutree-api
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  replicaCount: 1
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP
  # Optional Ingress for the control-plane API (`<fullname>-api-service:3000`).
  # Requires an ingress controller in the cluster. TLS Secret and controller
  # installation are the operator's responsibility.
  ingress:
    enabled: false
    className: ""        # e.g. "nginx", "traefik"; empty -> cluster default IngressClass
    annotations: {}      # controller-specific options, e.g.
                         #   nginx.ingress.kubernetes.io/proxy-body-size: 10m
                         #   cert-manager.io/cluster-issuer: letsencrypt-prod
    host: ""
    path: /
    pathType: Prefix
    tls: []              # k8s-native, e.g.
                         #   - hosts: ["api.neutree.example.com"]
                         #     secretName: neutree-api-tls

vmagent:
  image:
    registry: ""
    repository: victoriametrics/vmagent
    tag: "v1.115.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  persistence:
    enabled: true
    size: 1Gi
    accessModes:
      - ReadWriteOnce

kong:
  image:
    registry: ""
    repository: kong/kong
    tag: "3.9"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1
      memory: 2Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  proxyService:
    type: LoadBalancer
  # Optional Ingress for the inference gateway (Kong proxy at
  # `<fullname>-kong-proxy:80`). Use a higher `proxy-body-size` here if your
  # users upload large payloads. Kong admin/manager Services stay internal
  # regardless of this setting.
  ingress:
    enabled: false
    className: ""
    annotations: {}      # e.g. nginx.ingress.kubernetes.io/proxy-body-size: 100m
    host: ""
    path: /
    pathType: Prefix
    tls: []

vector:
  image:
    registry: ""
    repository: timberio/vector
    tag: 0.47.0-debian
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# VictoriaLogs — the AI inference trace store. Vector ships full
# request/response trace records here, and neutree-api queries it via
# --ai-trace-store-url. Disable (enabled: false) to use an external store
# configured through system.aiTraceStoreUrl, or to turn the feature off.
victorialogs:
  enabled: true
  image:
    registry: ""
    repository: victoriametrics/victoria-logs
    tag: "v1.50.0"
    pullPolicy: IfNotPresent
  # AI-trace request/response bodies can be large; raise the per-line ingest
  # limit (bytes) so VictoriaLogs does not drop them. Matches docker-compose.
  maxLineSizeBytes: 16777216
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  persistence:
    enabled: true
    size: 40Gi
    accessModes:
      - ReadWriteOnce
  service:
    type: ClusterIP

jwtCli:
  image:
    registry: ""
    repository: neutree/jwt-cli
    tag: 6.2.0
    pullPolicy: IfNotPresent

# Ingress is configured per component:
#   - control-plane API:  api.ingress.*  (parent chart template)
#   - inference gateway:  kong.ingress.* (parent chart template)
#   - Grafana UI:         grafana.ingress.* (Grafana subchart template)
#   - VMInsert metrics:   victoria-metrics-cluster.vminsert.ingress.* (VictoriaMetrics subchart template)
# Each can be enabled and configured independently with its own ingress class,
# annotations, and TLS spec. An ingress controller must be installed in the
# cluster; TLS Secret / cert provisioning is the operator's responsibility.

victoria-metrics-cluster:
  enabled: true
  # global.image.registry is inherited from parent chart's global.image.registry
  vmselect:
    replicaCount: 1
  vminsert:
    replicaCount: 1
    service:
      # Optional parent-chart override used by neutree-core / vmagent for
      # nonstandard vminsert Service names. Empty follows
      # victoria-metrics-cluster.vminsert.fullnameOverride when set, otherwise
      # the dependency chart default: `<release>-victoria-metrics-cluster-vminsert`.
      name: ""
      type: LoadBalancer
    # Native VictoriaMetrics subchart Ingress for VMInsert.
    # Backend service defaults to `<release>-victoria-metrics-cluster-vminsert`
    # port `http` (8480). Internal Neutree metrics writes still use the
    # in-cluster Service, not the external Ingress URL.
    ingress:
      enabled: false
      ingressClassName: ""  # e.g. "contour", "nginx"; empty -> cluster default IngressClass
      annotations: {}
      extraLabels: {}
      hosts: []             # e.g.
                            #   - name: vminsert.neutree.example.com
                            #     path:
                            #       - /insert
                            #     port: http
      pathType: Prefix
      tls: []               # e.g.
                            #   - hosts: ["vminsert.neutree.example.com"]
                            #     secretName: neutree-vminsert-tls
  vmstorage:
    replicaCount: 1
    persistentVolume:
      size: 40Gi

grafana:
  enabled: true
  # Grafana will automatically use global.imageRegistry from parent chart
  deploymentStrategy:
    type: Recreate
  image:
    # -- The Docker registry
    registry: "docker.io"
    # -- Docker image repository
    repository: grafana/grafana
    # Overrides the Grafana image tag whose default is the chart appVersion
    tag: "11.5.3"

  testFramework:
    enabled: false

  persistence:
    enabled: true
    size: 1Gi

  initChownData:
    enabled: false

  grafana.ini:
    auth.anonymous:
      enabled: true
    dashboards:
    # Path to the default home dashboard. If this value is empty, then Grafana uses StaticRootPath + "dashboards/home.json"
      default_home_dashboard_path: /var/lib/grafana/dashboards/default_grafana_dashboard.json
    analytics:
      check_for_plugin_updates: false
      check_for_updates: false
      enabled: false
      reporting_enabled: false
    plugins:
      public_key_retrieval_disabled: true
    security:
      preinstall_disabled: true
      allow_embedding: true
    panels:
      disable_sanitize_html: true
    grafana_net:
      url: ""
  dashboardProviders:
    dashboardproviders.yaml:
      - name: neutree
        orgId: 1
        folder: ''
        type: file
        options:
          path: /var/lib/grafana/dashboards
  assertNoLeakedSecrets: false

  adminUser: admin
  adminPassword: admin

  extraConfigmapMounts:
  - name: datasources
    mountPath: /etc/grafana/provisioning/datasources
    configMap: grafana-datasources
    readOnly: true
    optional: false
  - name: dashboards
    mountPath: /var/lib/grafana/dashboards
    configMap: grafana-dashboards
    readOnly: true
  service:
    enabled: true
    # Optional parent-chart override used by neutree-api for nonstandard
    # Grafana Service names. Empty follows grafana.fullnameOverride when set,
    # otherwise the dependency chart default: `<release>-grafana`.
    name: ""
    type: LoadBalancer

  # Native Grafana subchart Ingress for the Grafana UI. When enabled with at
  # least one host and system.grafana.url is empty, neutree-api automatically
  # exposes this external URL through the system-info API. For a non-root path,
  # also set grafana.ini.server.root_url / serve_from_sub_path as required by
  # Grafana.
  ingress:
    enabled: false
    ingressClassName: ""    # e.g. "contour", "nginx"; empty -> cluster default IngressClass
    annotations: {}
    labels: {}
    path: /
    pathType: Prefix
    hosts: []               # e.g. ["grafana.neutree.example.com"]
    tls: []                 # e.g.
                            #   - hosts: ["grafana.neutree.example.com"]
                            #     secretName: neutree-grafana-tls



