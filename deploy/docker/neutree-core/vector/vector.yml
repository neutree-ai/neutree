sources:
  kong_logs:
    type: http_server
    address: 0.0.0.0:30122
    encode: json
transforms:
  parse_kong_logs:
    type: remap
    inputs:
      - kong_logs
    source: |
      . = parse_json!(.message)

      # Access fields with hyphens using proper VRL syntax

      .extracted_data.request_id = .request.id
      .extracted_data.timestamp = .started_at
      .extracted_data.status = .response.status
      .extracted_data.api_version = .request.api_version
      .extracted_data.api_key_id = .consumer.custom_id
      if exists(.request.uri) {
          .extracted_data.url_split = split!(.request.uri, "/")
          .extracted_data.workspace = .extracted_data.url_split[2]      # workspace name from /workspace/{workspace}/...
          .extracted_data.endpoint_type = .extracted_data.url_split[3]  # "endpoint" or "external-endpoint"
          .extracted_data.endpoint_name = .extracted_data.url_split[4]  # endpoint name from /workspace/{workspace}/{type}/{endpoint_name}
      }

      if exists(.ai) && exists(.ai."statistics") && exists(.ai."statistics".usage) {
          .extracted_data.total_tokens = .ai."statistics".usage.total_tokens
          .extracted_data.prompt_tokens = .ai."statistics".usage.prompt_tokens
          .extracted_data.completion_tokens = .ai."statistics".usage.completion_tokens
          .extracted_data.cache_read_tokens = .ai."statistics".usage.cache_read_tokens
          .extracted_data.cache_creation_tokens = .ai."statistics".usage.cache_creation_tokens
          .extracted_data.reasoning_tokens = .ai."statistics".usage.reasoning_tokens
          .extracted_data.cost_usd = .ai."statistics".usage.cost

          if exists(.ai."statistics".meta) && exists(.ai."statistics".meta.request_model) {
              .extracted_data.model_name = .ai."statistics".meta.request_model
          }

          if exists(.ai."statistics".meta) && exists(.ai."statistics".meta.message_id) {
              .extracted_data.message_id = .ai."statistics".meta.message_id
          }

          if to_int!(.extracted_data.total_tokens) > 0 {
              ._has_usage = true
          } else {
              ._has_usage = false
          }
      } else {
          ._has_usage = false
      }
  filter_usage_logs:
    type: filter
    inputs:
      - parse_kong_logs
    condition: ._has_usage == true
  prepare_postgrest_payload:
    type: remap
    inputs:
      - filter_usage_logs
    source: |
      . = {
          "p_api_key_id": .extracted_data.api_key_id,
          "p_request_id": .extracted_data.request_id,
          "p_usage_amount": .extracted_data.total_tokens,
          "p_endpoint_name": .extracted_data.endpoint_name,
          "p_endpoint_type": .extracted_data.endpoint_type,
          "p_model_name": .extracted_data.model_name,
          "p_prompt_tokens": .extracted_data.prompt_tokens,
          "p_completion_tokens": .extracted_data.completion_tokens,
          "p_cache_read_tokens": .extracted_data.cache_read_tokens,
          "p_cache_creation_tokens": .extracted_data.cache_creation_tokens,
          "p_reasoning_tokens": .extracted_data.reasoning_tokens,
          "p_cost_usd": .extracted_data.cost_usd,
          "p_message_id": .extracted_data.message_id
      }
  filter_trace_logs:
    type: filter
    inputs:
      - parse_kong_logs
    condition: exists(.ai."trace".request_body) || exists(.ai."trace".response_body)
  prepare_trace_payload:
    type: remap
    inputs:
      - filter_trace_logs
    source: |
      # Field names and limits below form a contract with the query side:
      # internal/routes/logs/trace_store.go reassembles chunked bodies and
      # filters record_type="chunk" out of every trace query. Keep in sync.
      rid = .request.id || "ai-trace"
      rid = to_string(rid) ?? "ai-trace"
      req_body = to_string(.ai."trace".request_body) ?? ""
      resp_body = to_string(.ai."trace".response_body) ?? ""

      rec = {
          # VictoriaLogs rejects records without a non-empty `_msg`. Failed
          # requests often carry no response body, so `_msg` must be a field
          # that is always populated — never the (optional) response body.
          "_msg":           rid,
          "request_id":     .request.id,
          "timestamp":      .started_at,
          "workspace":      .extracted_data.workspace || "",
          "endpoint_type":  .extracted_data.endpoint_type || "",
          "endpoint_name":  .extracted_data.endpoint_name || "",
          # Optional string columns are coalesced to "" so every record carries
          # the same string type even when the source field is absent (e.g. an
          # error response that returned early before `ai.statistics`, or a
          # success with no `finish_reason`). The numeric columns below are left
          # nullable on purpose: the query API decodes them into pointer/optional
          # fields and must distinguish "no token/latency data" from a real 0.
          "api_key_id":     .consumer.custom_id || "",
          "request_uri":    .request.uri || "",
          "request_model":  .ai."statistics".meta.request_model || "",
          "response_model": .ai."statistics".meta.response_model || "",
          "response_status": .response.status,
          "prompt_tokens":     .ai."statistics".usage.prompt_tokens,
          "completion_tokens": .ai."statistics".usage.completion_tokens,
          "total_tokens":      .ai."statistics".usage.total_tokens,
          "finish_reason":  .ai."trace".finish_reason || "",
          "stream":         .ai."trace".stream || false,
          "user_agent":     .request.headers."user-agent" || "",
          "duration_ms":    .latencies.request,
          "request_body":   req_body,
          "response_body":  resp_body,
      }

      # VictoriaLogs hard-drops any record whose estimated JSON size exceeds
      # 2MiB (maxUncompressedBlockSize — hardcoded upstream, cannot be raised;
      # https://docs.victoriametrics.com/victorialogs/faq/). Bodies that fit
      # comfortably below that ship as a single record; larger bodies are split
      # into companion chunk records (~1MiB each) that neutree-api's trace
      # store reassembles on read. Chunks share the parent's timestamp and
      # stream fields so they live in the same stream and expire together.
      # Chunking additionally requires a non-empty string request id: it is the
      # grouping key that ties chunks back to their parent, so a missing or
      # non-string id falls back to the single-record path (as before this
      # change) rather than risk cross-trace chunk mixing.
      #
      # chunk_data is base64: chunks() splits on raw byte offsets, which can
      # cut a multi-byte UTF-8 character in half — the halves would be
      # lossily replaced (U+FFFD) during JSON encoding and the body could
      # never be reassembled byte-exact. Base64 text is ASCII, so any byte
      # split survives; 1MiB is a multiple of 4, so every chunk (and any
      # truncated prefix of chunks) stays independently valid base64.
      if length(req_body) + length(resp_body) <= 1572864 || !is_string(.request.id) || .request.id == "" {
          . = rec
      } else {
          chunk_size = 1048576 # 1MiB of base64 text (~768KiB of body) per chunk record
          max_chunks = 16      # per body (~12MiB of body); anything longer is truncated

          req_chunks = chunks(encode_base64(req_body), chunk_size)
          resp_chunks = chunks(encode_base64(resp_body), chunk_size)

          truncated = false
          if length(req_chunks) > max_chunks {
              req_chunks = slice(req_chunks, 0, max_chunks) ?? req_chunks
              truncated = true
          }
          if length(resp_chunks) > max_chunks {
              resp_chunks = slice(resp_chunks, 0, max_chunks) ?? resp_chunks
              truncated = true
          }

          rec.request_body = ""
          rec.response_body = ""
          rec.body_chunked = true
          rec.body_truncated = truncated
          rec.request_chunks = length(req_chunks)
          rec.response_chunks = length(resp_chunks)

          events = [rec]
          for_each(array!(req_chunks)) -> |i, chunk| {
              events = push(events, {
                  "_msg":          rid + "#request." + to_string(i),
                  "record_type":   "chunk",
                  "request_id":    rec.request_id,
                  "timestamp":     rec.timestamp,
                  "workspace":     rec.workspace,
                  "endpoint_type": rec.endpoint_type,
                  "endpoint_name": rec.endpoint_name,
                  "chunk_kind":    "request",
                  "chunk_seq":     i,
                  "chunk_data":    chunk,
              })
          }
          for_each(array!(resp_chunks)) -> |i, chunk| {
              events = push(events, {
                  "_msg":          rid + "#response." + to_string(i),
                  "record_type":   "chunk",
                  "request_id":    rec.request_id,
                  "timestamp":     rec.timestamp,
                  "workspace":     rec.workspace,
                  "endpoint_type": rec.endpoint_type,
                  "endpoint_name": rec.endpoint_name,
                  "chunk_kind":    "response",
                  "chunk_seq":     i,
                  "chunk_data":    chunk,
              })
          }
          . = events
      }
sinks:
  postgrest_rpc:
    type: http
    inputs:
      - prepare_postgrest_payload
    encoding:
      codec: json
    framing:
      method: newline_delimited
    compression: none
    uri: http://neutree-api:3000/api/v1/rpc/record_api_usage
    method: post
    auth:
      strategy: bearer
      token: {{ .JwtToken}}
    headers:
      Content-Type: application/json
    batch:
      max_events: 1
      timeout_secs: 1
  ai_trace_file:
    type: file
    inputs:
      - prepare_trace_payload
    path: /var/log/vector/ai-trace-%Y-%m-%d.log
    encoding:
      codec: json
    framing:
      method: newline_delimited
  ai_trace_victorialogs:
    type: http
    inputs:
      - prepare_trace_payload
    uri: http://victorialogs:9428/insert/jsonline?_stream_fields=workspace,endpoint_type,endpoint_name&_time_field=timestamp
    method: post
    encoding:
      codec: json
    framing:
      method: newline_delimited
    compression: none
    request:
      headers:
        Content-Type: application/stream+json
    batch:
      max_events: 100
      timeout_secs: 1